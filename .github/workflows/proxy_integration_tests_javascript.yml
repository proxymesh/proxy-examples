# Integration tests against a real proxy (PROXY_URL). Add repository secret PROXY_URL
# under Settings → Secrets and variables → Actions, then mark this workflow as a required
# status check under branch protection (pull_request events only receive secrets for PRs
# from the same repository, not from forks).

name: Proxy integration tests (JavaScript)

on:
  pull_request:

permissions:
  contents: read

jobs:
  integration:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2 (Node 24)
        with:
          persist-credentials: false

      - name: Detect JavaScript changes
        id: changes
        run: |
          set -euo pipefail
          changed="false"
          while IFS= read -r file; do
            case "${file}" in
              javascript/*|.github/workflows/proxy_integration_tests_javascript.yml)
                changed="true"
                break
                ;;
            esac
          done < <(git diff --name-only "${{ github.event.pull_request.base.sha }}" "${{ github.sha }}")
          echo "changed=${changed}" >> "${GITHUB_OUTPUT}"

      - name: Set up Node
        if: steps.changes.outputs.changed == 'true'
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0 (Node 24)
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: javascript/package-lock.json

      - name: Install dependencies
        if: steps.changes.outputs.changed == 'true'
        working-directory: javascript
        run: npm ci

      - name: Require PROXY_URL Actions secret
        if: steps.changes.outputs.changed == 'true'
        env:
          PROXY_URL: ${{ secrets.PROXY_URL }}
        run: |
          if [ -z "${PROXY_URL}" ]; then
            echo "::error::PROXY_URL is not set. Add a repository (or environment) secret named PROXY_URL under Settings → Secrets and variables → Actions."
            exit 1
          fi

      - name: Run integration tests
        if: steps.changes.outputs.changed == 'true'
        working-directory: javascript
        env:
          PROXY_URL: ${{ secrets.PROXY_URL }}
        run: npm test

      - name: Skip when JavaScript files are unchanged
        if: steps.changes.outputs.changed != 'true'
        run: echo "No JavaScript integration test changes detected; skipping."
